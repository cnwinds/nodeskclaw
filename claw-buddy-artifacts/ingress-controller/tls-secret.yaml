# TLS Secret 模板 -- 存放 *.nodesk.tech 通配符证书
#
# 使用方式:
#   1. 将通配符证书的 fullchain.pem 和 privkey.pem 进行 base64 编码
#   2. 替换下方 <BASE64_ENCODED_CERT> 和 <BASE64_ENCODED_KEY>
#   3. kubectl apply -f tls-secret.yaml
#
# 或者直接用 kubectl 命令创建:
#   kubectl create secret tls wildcard-nodesk-tls \
#     --cert=fullchain.pem \
#     --key=privkey.pem \
#     -n clawbuddy-system
#
# 注意: 该 Secret 在 clawbuddy-system 命名空间中创建。
# Ingress Controller 通过 --default-ssl-certificate 参数引用它，
# 所有 Ingress 规则自动使用此证书，无需在每个实例 Namespace 重复创建。

apiVersion: v1
kind: Secret
metadata:
  name: wildcard-nodesk-tls
  namespace: clawbuddy-system
type: kubernetes.io/tls
data:
  tls.crt: <BASE64_ENCODED_CERT>
  tls.key: <BASE64_ENCODED_KEY>
