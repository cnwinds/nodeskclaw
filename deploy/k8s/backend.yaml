apiVersion: apps/v1
kind: Deployment
metadata:
  name: nodeskclaw-backend
  labels:
    app: nodeskclaw-backend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: nodeskclaw-backend
  template:
    metadata:
      labels:
        app: nodeskclaw-backend
    spec:
      imagePullSecrets:
        - name: cr-pull-secret
      containers:
        - name: nodeskclaw-backend
          image: <YOUR_REGISTRY>/<YOUR_NAMESPACE>/nodeskclaw-backend:20260227-a195b8d
          ports:
            - containerPort: 8000
          envFrom:
            - secretRef:
                name: nodeskclaw-backend-env
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: "1"
              memory: 1Gi
          readinessProbe:
            httpGet:
              path: /api/v1/health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 15
          livenessProbe:
            httpGet:
              path: /api/v1/health
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 30
---
apiVersion: v1
kind: Service
metadata:
  name: nodeskclaw-backend
  labels:
    app: nodeskclaw-backend
spec:
  type: ClusterIP
  selector:
    app: nodeskclaw-backend
  ports:
    - port: 8000
      targetPort: 8000
      protocol: TCP
