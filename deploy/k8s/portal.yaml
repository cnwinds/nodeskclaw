apiVersion: apps/v1
kind: Deployment
metadata:
  name: nodeskclaw-portal
  labels:
    app: nodeskclaw-portal
spec:
  replicas: 1
  selector:
    matchLabels:
      app: nodeskclaw-portal
  template:
    metadata:
      labels:
        app: nodeskclaw-portal
    spec:
      imagePullSecrets:
        - name: cr-pull-secret
      containers:
        - name: nodeskclaw-portal
          image: <YOUR_REGISTRY>/<YOUR_NAMESPACE>/nodeskclaw-portal:20260227-ab67cbf
          ports:
            - containerPort: 80
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: nodeskclaw-portal
  labels:
    app: nodeskclaw-portal
spec:
  type: ClusterIP
  selector:
    app: nodeskclaw-portal
  ports:
    - port: 80
      targetPort: 80
      protocol: TCP
